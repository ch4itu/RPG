<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starfall: Tiny Retro RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <h1>Starfall: Tiny Retro RPG</h1>
    <p class="subtitle">WASD / Arrow Keys to move · E or Space to interact · 1/2/3 in battle</p>
    <canvas id="game" width="640" height="360" aria-label="Retro RPG game canvas"></canvas>
    <section class="hud-panel">
      <p id="statusLine">Booting the world...</p>
      <p id="hintLine">Hint: Find Elder Rowan in the village center.</p>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
